{% extends "base.html" %}
{% block content %}

<style>
    body {
        background: #f7f9fc;
    }

    .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }

    .homePage {
        text-align: center;
        max-width: 700px;
        width: 100%;
    }

    .title {
        font-size: 34px;
        font-weight: bold;
        color: #1e3c72;
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 16px;
        color: #555;
        margin-bottom: 25px;
    }

    .search-box {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
    }

    .search-box input {
        width: 400px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
    }

    .search-box button {
        margin-left: 10px;
        padding: 12px 18px;
        border: none;
        background: #ff7a18;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    .search-box button:hover {
        background: #e66a10;
    }

    .examples {
        margin-top: 15px;
        color: #666;
        font-size: 14px;
    }

    .examples span {
        display: inline-block;
        margin: 5px;
        padding: 6px 10px;
        background: #eef3f8;
        border-radius: 6px;
        cursor: pointer;
    }

    .examples span:hover {
        background: #dde7f0;
    }

    .image img {
        margin-top: 30px;
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
</style>

<script>
function fillSearch(text) {
    document.getElementById("searchInput").value = text;
}
</script>

<div class="wrapper">

    <div class="homePage">

        <div class="title">Margie's Travel Search</div>
        <div class="subtitle">Explore hotel reviews and travel insights</div>

        <form action="/search" method="get">
            <div class="search-box">
                <input 
                    id="searchInput"
                    type="text" 
                    name="search" 
                    placeholder="Search for hotels, reviews, locations..." 
                    required>
                <button type="submit">Search</button>
            </div>
        </form>

        <div class="examples">
            Try:
            <span onclick="fillSearch('Dubai hotels')">Dubai hotels</span>
            <span onclick="fillSearch('Hotels near Dubai Creek')">Near Dubai Creek</span>
            <span onclick="fillSearch('Luxury hotel reviews')">Luxury hotels</span>
        </div>

        <div class="image">
            <img src="{{ url_for('static', filename='images/margies.jpg') }}">
        </div>

    </div>

</div>

{% endblock %}
